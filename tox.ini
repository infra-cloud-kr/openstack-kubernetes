[tox]
minversion = 4.0
envlist = docs,pep8
skipsdist = true

[testenv]
basepython = python3
deps =
    -r{toxinidir}/doc/requirements.txt

[testenv:docs]
description = HTML 문서를 빌드합니다 (경고를 오류로 처리).
commands =
    sphinx-build -W --keep-going -b html doc/source doc/build/html

[testenv:docs-en]
description = 영어 HTML 문서를 빌드합니다 (/en/ 하위 경로).
commands =
    sphinx-build -W --keep-going -b html -D language=en \
        doc/source doc/build/html/en

[testenv:gettext]
description = 번역 대상 문자열을 .pot 카탈로그로 추출합니다.
commands =
    sphinx-build -b gettext doc/source doc/build/gettext

[testenv:update-po]
description = .pot 추출 후 .po 카탈로그를 갱신합니다 (기존 번역 보존).
commands =
    sphinx-build -b gettext doc/source doc/build/gettext
    sphinx-intl update -p doc/build/gettext -d doc/source/locales -l en

[testenv:pep8]
description = reStructuredText 문법/스타일을 doc8 로 검사합니다.
commands =
    doc8 doc/source README.rst CONTRIBUTING.rst

[doc8]
# 줄 길이 기준 (D001). 필요 시 조정하세요.
max-line-length = 79
ignore-path = doc/build,doc/source/locales
